name: "SBOM and Vulnerability Scanning"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 1 * *"

permissions:
  contents: read
  security-events: write

jobs:
  sbom-scan:
    name: SBOM + Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      #################################################################
      # Checkout
      #################################################################
      - name: Checkout repository
        uses: actions/checkout@v5

      #################################################################
      # Go setup
      #################################################################
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Show Go version
        run: go version

      #################################################################
      # Install tools
      #################################################################
      - name: Install Syft, Grype, jq
        run: |
          set -euo pipefail

          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | bash -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | bash -s -- -b /usr/local/bin

          sudo apt-get update
          sudo apt-get install -y jq

          syft version
          grype version
          jq --version

      #################################################################
      # Ensure deterministic dependency state
      #################################################################
      - name: Normalize Go module state
        shell: bash
        run: |
          set -euo pipefail

          echo "Cleaning module cache and ensuring reproducibility..."
          go clean -modcache

          if [ -f go.mod ]; then
            go mod tidy
            go mod download
          fi

      #################################################################
      # SBOM generation and clean cache
      #################################################################
      - name: Generate SBOM (clean scope)
        run: |
          set -euo pipefail

          echo "Generating SBOM from repository only..."

          GOPATH=$(go env GOPATH)

          # Convert GOPATH to relative pattern if inside workspace (safe fallback)
          GOPATH_REL="**/go/pkg/mod/**"

          syft dir:. \
            --exclude "**/.git/**" \
            --exclude "**/vendor/**" \
            --exclude "**/bin/**" \
            --exclude "**/dist/**" \
            --exclude "**/build/**" \
            --exclude "$GOPATH_REL" \
            -o spdx-json=sbom.spdx.json

          jq empty sbom.spdx.json

          echo "SBOM generation complete"

      #################################################################
      # Grype scan + SARIF generation
      #################################################################
      - name: Run Grype scan
        run: |
          set -euo pipefail

          echo "Running Grype table scan..."
          grype sbom:./sbom.spdx.json -o table

          echo "Generating SARIF..."
          grype sbom:./sbom.spdx.json -o sarif > grype-results.sarif

          if [ ! -s grype-results.sarif ]; then
            echo "ERROR: SARIF file is empty"
            exit 1
          fi

          jq empty grype-results.sarif
          echo "SARIF valid"

      #################################################################
      # Fail gate: High/Critical only
      #################################################################
      - name: Fail on High/Critical vulnerabilities
        run: |
          set -euo pipefail

          echo "Checking High/Critical vulnerabilities..."

          COUNT=$(grype sbom:./sbom.spdx.json -o json \
            | jq '[.matches[]
              | select(.vulnerability.severity=="High"
                    or .vulnerability.severity=="Critical")] | length')

          echo "High/Critical count: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "Blocking build due to High/Critical vulnerabilities"

            grype sbom:./sbom.spdx.json -o json \
              | jq -r '.matches[]
                | select(.vulnerability.severity=="High"
                      or .vulnerability.severity=="Critical")
                | "\(.artifact.name)@\(.artifact.version) -> \(.vulnerability.id) (\(.vulnerability.severity))"'

            exit 1
          fi

      #################################################################
      # OSV scan (SPDX-safe + loop-safe)
      #################################################################
      - name: OSV vulnerability scan
        shell: bash
        run: |
          set -euo pipefail

          echo "Running OSV scan..."

          FOUND=0

          jq -c '.packages[] | {name: .name, version: (.versionInfo // "")}' sbom.spdx.json |
          while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            VERSION=$(echo "$pkg" | jq -r '.version')

            if [ -z "$NAME" ] || \
               [ -z "$VERSION" ] || \
               [ "$VERSION" = "NOASSERTION" ] || \
               [ "$VERSION" = "UNKNOWN" ]; then
              continue
            fi

            RESP=$(curl -s -X POST https://api.osv.dev/v1/query \
              -H "Content-Type: application/json" \
              -d "{\"package\":{\"name\":\"$NAME\"},\"version\":\"$VERSION\"}")

            if echo "$RESP" | jq -e '.vulns and (.vulns|length>0)' >/dev/null; then
              echo "Vulnerable: $NAME@$VERSION"
              echo "$RESP" | jq -r '.vulns[] | "• \(.id): \(.summary // "No summary")"'
              FOUND=1
            fi
          done

          exit $FOUND

      #################################################################
      # Upload SARIF (GitHub Security tab)
      #################################################################
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype-results.sarif