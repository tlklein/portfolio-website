name: Build and Deploy Static Site
# Build website, then push to infra
on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  SOURCE_DIR: ./dist
  DISTRIBUTION_ID: ${{ secrets.DISTRIBUTION }}

jobs:
  ########################################################
  # Build the site, then save to an artifact 
  ########################################################
  build-site:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      # .\node_modules\.bin\astro build
      - name: Build Astro site
        run: |
          npm run build 
          test -d dist
      
      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-artifact
          path: dist/
          retention-days: 1
            
  ########################################################
  # Deploy to S3 bucket & invalidate CloudFront cache 
  ########################################################
  deploy-site:
    needs: build-site
    runs-on: ubuntu-latest
    steps:
      - name: Download built site artifact (from build-html job)
        uses: actions/download-artifact@v4
        with:
          name: site
          path: ./dist

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GithubActionsDeployRole
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync site to S3
        run: |
          aws s3 sync ./dist s3://${{ secrets.AWS_S3_BUCKET }} --delete
      
      - name: Invalidate CloudFront cache
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ secrets.DISTRIBUTION }}
          PATHS: "/*"
          AWS_REGION: ${{ secrets.AWS_REGION }}