name: "SBOM Generation"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 1 * *' # 1st of every month, 00:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  #################################################################
  # SBOM generation
  #################################################################
  sbom-generation:
    name: SBOM Generation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      #################################################################
      # Install latest stable Go
      #################################################################
      - name: Set up latest stable Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Show Go version
        run: go version

      #################################################################
      # Install Syft, Grype, and jq
      #################################################################
      - name: Install Syft, Grype, and jq
        run: |
          set -euo pipefail

          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | bash -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | bash -s -- -b /usr/local/bin

          sudo apt-get update
          sudo apt-get install -y jq

          syft version
          grype version
          jq --version

      #################################################################
      # Patch vulnerable modules safely
      #################################################################
      - name: Patch vulnerable Go modules and update dependencies
        shell: bash
        run: |
          set -euo pipefail

          echo "Processing all go.mod files..."

          find . -name go.mod -print | while read -r gm; do
            dir=$(dirname "$gm")

            echo "--- Processing $gm ---"

            pushd "$dir" >/dev/null || continue

            # Ensure valid Go version
            go mod edit -go=1.26.3 || true

            # 1. Force Go to use the patched versions globally via replacement
            go mod edit -replace github.com/containerd/containerd=github.com/containerd/containerd@v1.7.32
            go mod edit -replace github.com/opencontainers/selinux=github.com/opencontainers/selinux@v1.13.0

            # 2. Re-verify dependencies with patch-level upgrades
            go get -u=patch ./... || true

            # 3. Clean module files
            go mod tidy || true

            echo "Installed module versions:"
            go list -m all | grep -E 'selinux|containerd' || echo "No matching modules found"

            popd >/dev/null
          done

          echo "Dependency patching complete."

      #################################################################
      # Generate SBOM
      #################################################################
      - name: Generate SBOM
        run: |
          set -euo pipefail

          echo "Generating SBOM in Syft JSON format..."

          syft . -o syft-json > sbom.json

          echo "Validating SBOM JSON..."

          jq empty sbom.json

          echo "SBOM successfully generated and validated."
      
      - name: Clean SBOM
        run: |
          echo "Skip cleaning the scan input; keep sbom.spdx.json untouched."