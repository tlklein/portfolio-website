name: "SBOM + Vulnerability Scans"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: read
  security-events: write

jobs:

  #################################################################
  # SBOM generation + dependency patching
  #################################################################
  sbom-generation:
    name: SBOM Generation
    runs-on: ubuntu-latest
    outputs:
      sbom_ready: ${{ steps.done.outputs.sbom_ready }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up latest stable Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Show Go version
        run: go version

      - name: Install Syft, Grype, and jq
        run: |
          set -euo pipefail

          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | bash -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | bash -s -- -b /usr/local/bin

          sudo apt-get update
          sudo apt-get install -y jq

          syft version
          grype version
          jq --version

      - name: Patch vulnerable Go modules and update dependencies
        shell: bash
        run: |
          set -euo pipefail

          find . -name go.mod -print | while read -r gm; do
            dir=$(dirname "$gm")
            pushd "$dir" >/dev/null || continue

            go mod edit -go=1.24 || true

            go get github.com/opencontainers/selinux@v1.13.0 || true
            go get github.com/containerd/containerd@v1.7.32 || true

            go mod edit -replace=github.com/containerd/containerd=github.com/containerd/containerd@v1.7.32 || true

            go get -u=patch ./... || true
            go mod tidy || true

            popd >/dev/null
          done

      - name: Generate SBOM
        run: |
          set -euo pipefail
          syft packages . -o json > sbom.json
          jq empty sbom.json

      - name: Clean SBOM
        run: |
          jq '
            if .artifacts then
              .artifacts |= map(select(.name != null and .version != null and .version != "null"))
            else .
            end
          ' sbom.json > sbom.cleaned.json

          mv sbom.cleaned.json sbom.json

      - id: done
        run: echo "sbom_ready=true" >> $GITHUB_OUTPUT


  #################################################################
  # Vulnerability scanning (Grype + OSV)
  #################################################################
  vulnerability-scan:
    name: Grype + OSV Scanning
    runs-on: ubuntu-latest
    needs: sbom-generation

    steps:
      - uses: actions/checkout@v5

      - name: Install Syft, Grype, jq
        run: |
          set -euo pipefail

          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | bash -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | bash -s -- -b /usr/local/bin

          sudo apt-get update
          sudo apt-get install -y jq

      - name: Download SBOM from previous job
        uses: actions/download-artifact@v4
        with:
          name: sbom.json
        continue-on-error: true

      - name: Generate SBOM if missing
        run: |
          if [ ! -f sbom.json ]; then
            echo "SBOM missing — regenerating..."
            syft packages . -o json > sbom.json
          fi

      - name: Scan SBOM with Grype
        shell: bash
        run: |
          set -euo pipefail

          CRIT_HIGH_SBOM=$(grype sbom:./sbom.json -o json | jq '[.matches[] | select(.vulnerability.severity=="Critical" or .vulnerability.severity=="High")] | length')

          echo "SBOM Critical/High count: $CRIT_HIGH_SBOM"

          if [ "$CRIT_HIGH_SBOM" -gt 0 ]; then
            grype sbom:./sbom.json -o json | jq -r '.matches[] | select(.vulnerability.severity=="Critical" or .vulnerability.severity=="High") | "SBOM: \(.artifact.name) \(.artifact.version) -> \(.vulnerability.id) \(.vulnerability.severity)"'
            exit 1
          fi

      - name: OSV API vulnerability check
        shell: bash
        run: |
          set -euo pipefail

          FOUND=0

          jq -c '.artifacts[] | {name: .name, version: .version}' sbom.json | while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            VERSION=$(echo "$pkg" | jq -r '.version')

            if [ -z "$NAME" ] || [ -z "$VERSION" ] || [ "$VERSION" = "UNKNOWN" ]; then
              continue
            fi

            RESPONSE=$(curl -s -X POST "https://api.osv.dev/v1/query" \
              -H "Content-Type: application/json" \
              -d "{\"package\": {\"name\": \"$NAME\"}, \"version\": \"$VERSION\"}")

            if echo "$RESPONSE" | jq -e '.vulns and (.vulns | length > 0)' >/dev/null 2>&1; then
              echo "$NAME@$VERSION has vulnerabilities"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi