name: "SBOM and Vulnerability Scanning"

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  sbom:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Install Syft, Grype, and jq
        run: |
          set -euo pipefail

          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | bash -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | bash -s -- -b /usr/local/bin

          sudo apt-get update
          sudo apt-get install -y jq

          syft version
          grype version
          jq --version

      #################################################################
      # Generate SPDX SBOM
      #################################################################
      - name: Generate SBOM in SPDX JSON
        run: |
          set -euo pipefail

          echo "Generating SPDX SBOM..."

          syft . -o spdx-json=sbom.spdx.json

          echo "Validating SPDX JSON..."
          jq empty sbom.spdx.json

          echo "SBOM generated successfully."

      #################################################################
      # Run Grype scans
      #################################################################
      - name: Scan SBOM with Grype
        run: |
          set -euo pipefail

          echo "Running Grype table scan..."
          grype sbom:./sbom.spdx.json -o table || true

          echo "Generating SARIF report..."
          grype sbom:./sbom.spdx.json -o sarif > grype-results.sarif

          echo "Checking for High/Critical vulnerabilities..."

          CRIT_HIGH=$(grype sbom:./sbom.spdx.json -o json | jq '[.matches[] | select(.vulnerability.severity=="Critical" or .vulnerability.severity=="High")] | length')

          echo "High/Critical vulnerability count: $CRIT_HIGH"

          if [ "$CRIT_HIGH" -gt 0 ]; then
            echo "High/Critical vulnerabilities detected."

            grype sbom:./sbom.spdx.json -o json | jq -r '
              .matches[]
              | select(
                  .vulnerability.severity=="Critical"
                  or
                  .vulnerability.severity=="High"
                )
              | "• \(.artifact.name) \(.artifact.version) -> \(.vulnerability.id) [\(.vulnerability.severity)]"
            '

            exit 1
          else
            echo "No High/Critical vulnerabilities detected."
          fi

      #################################################################
      # Upload SARIF to GitHub Security tab
      #################################################################
      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-results.sarif